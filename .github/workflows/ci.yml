name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  quality:
    name: Verify + Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify (format, lint, typecheck, build)
        run: npm run verify

      - name: Run unit tests
        run: npm run test

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e -- --update-snapshots=missing

      - name: Commit new platform snapshots
        # Auto-commit any linux baselines that were just generated so future
        # runs compare against them instead of re-creating from scratch.
        # Only runs on direct pushes (not fork PRs, which can't push back).
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add e2e/visual-regression.spec.ts-snapshots/
          git diff --staged --quiet || (git commit -m "chore: add linux visual regression baselines [skip ci]" && git push)

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
            e2e/visual-regression.spec.ts-snapshots/
