name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Verify + Unit Tests
    runs-on: ubuntu-latest
    env:
      PUBLIC_SANITY_STRICT_MODE: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify (format, lint, typecheck, build)
        run: npm run verify

      - name: Run unit tests
        run: npm run test

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    env:
      PUBLIC_SANITY_STRICT_MODE: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate missing linux visual baselines
        # Visual baselines live next to each spec under
        # `e2e/<spec>.ts-snapshots/`. We require a `-linux.png` for every
        # `-darwin.png` we have committed; if any are missing, regenerate
        # them all in one pass with `--update-snapshots`.  We don't swallow
        # the exit code: if Playwright fails to start the dev server here,
        # the next step's `git diff --staged` would silently produce no
        # changes and we'd never notice.
        run: |
          set -euo pipefail
          missing=0
          while IFS= read -r -d '' darwin; do
            linux="${darwin%-darwin.png}-linux.png"
            if [ ! -f "$linux" ]; then
              echo "Missing linux baseline: $linux"
              missing=1
            fi
          done < <(find e2e -type f -name '*-darwin.png' -print0)

          if [ "$missing" -eq 1 ]; then
            echo "Generating missing linux baselines..."
            npx playwright test e2e/visual-regression.spec.ts --update-snapshots
          else
            echo "All required linux baselines already present, skipping generation."
          fi

      - name: Commit new linux snapshots
        # Runs on direct branch pushes only; PRs can't push back but the
        # locally-generated files are still present for the next step.
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add e2e/visual-regression.spec.ts-snapshots/
          git diff --staged --quiet || \
            (git commit -m "chore: add linux visual regression baselines [skip ci]" \
             && git push)

      - name: Run full E2E suite
        run: npm run test:e2e

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
            e2e/visual-regression.spec.ts-snapshots/
